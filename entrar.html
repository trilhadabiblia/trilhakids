<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrando... — Trilho Kids</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen flex items-center justify-center font-sans">

  <!-- Estado: Carregando -->
  <div id="estado-loading" class="text-center px-6">
    <div class="text-8xl mb-6 animate-bounce">🎮</div>
    <h1 class="text-3xl font-black text-white mb-3">Preparando sua jornada...</h1>
    <p class="text-purple-200 text-lg">Aguarde um momento!</p>
    <div class="mt-8 flex justify-center gap-2">
      <div class="w-3 h-3 rounded-full bg-purple-400 animate-bounce" style="animation-delay:0s"></div>
      <div class="w-3 h-3 rounded-full bg-purple-400 animate-bounce" style="animation-delay:.15s"></div>
      <div class="w-3 h-3 rounded-full bg-purple-400 animate-bounce" style="animation-delay:.3s"></div>
    </div>
  </div>

  <!-- Estado: Bem-vindo -->
  <div id="estado-ok" class="text-center px-6 hidden">
    <div class="text-8xl mb-6">🌟</div>
    <h1 class="text-4xl font-black text-white mb-2">Olá, <span id="nome-aluno" class="text-yellow-300"></span>!</h1>
    <p class="text-purple-200 text-lg mb-2">Bem-vindo de volta ao Trilho Kids!</p>
    <p id="info-turma" class="text-gray-400 text-sm mb-8"></p>
    <p class="text-gray-400">Redirecionando em <span id="countdown" class="text-yellow-300 font-bold">3</span>s...</p>
  </div>

  <!-- Estado: Erro -->
  <div id="estado-erro" class="text-center px-6 hidden">
    <div class="text-8xl mb-6">😕</div>
    <h1 class="text-3xl font-black text-white mb-3">QR Code inválido</h1>
    <p id="mensagem-erro" class="text-gray-300 mb-8">O código escaneado não foi reconhecido.</p>
    <a href="/index.html"
      class="bg-gradient-to-r from-purple-600 to-violet-600 hover:from-purple-700 hover:to-violet-700
             text-white px-8 py-4 rounded-full font-black text-lg transition-all hover:scale-105 inline-block">
      🏠 Ir para o Portal
    </a>
  </div>

  <script src="/gamificacao.js"></script>
  <script>
    const API = (() => {
      const h = location.hostname;
      return (h === 'localhost' || h === '127.0.0.1')
        ? 'http://localhost:8080'
        : 'https://cafecomhomensdedeus.com.br/trilhokids/api';
    })();

    function mostrar(id) {
      ['estado-loading', 'estado-ok', 'estado-erro'].forEach(el => {
        document.getElementById(el).classList.add('hidden');
      });
      document.getElementById(id).classList.remove('hidden');
    }

    async function entrar() {
      // Lê token do hash (#token=...) ou query string (?token=...) por compatibilidade
      const hash   = new URLSearchParams(location.hash.replace(/^#/, ''));
      const params = new URLSearchParams(location.search);
      const token  = hash.get('token') || params.get('token');

      if (!token) {
        mostrar('estado-erro');
        document.getElementById('mensagem-erro').textContent = 'Nenhum token foi fornecido na URL.';
        return;
      }

      try {
        const res  = await fetch(`${API}/entrar.php?token=${encodeURIComponent(token)}`, { cache: 'no-store' });
        const data = await res.json();

        if (!data.ok) {
          mostrar('estado-erro');
          document.getElementById('mensagem-erro').textContent = data.erro || 'QR Code não reconhecido.';
          return;
        }

        const { nome, turma, instituicao } = data.dados;

        // Aguarda gamificacao.js inicializar
        let t = 0;
        while (typeof trilhoGame === 'undefined' && t++ < 30) {
          await new Promise(r => setTimeout(r, 100));
        }

        if (typeof trilhoGame !== 'undefined') {
          trilhoGame.setPerfilAtivo(nome);
        }

        document.getElementById('nome-aluno').textContent = nome;
        if (turma) {
          document.getElementById('info-turma').textContent =
            `${turma}${instituicao ? ' · ' + instituicao : ''}`;
        }
        mostrar('estado-ok');

        // Contagem regressiva → home
        let n = 3;
        const cd = document.getElementById('countdown');
        const iv = setInterval(() => {
          n--;
          cd.textContent = n;
          if (n <= 0) {
            clearInterval(iv);
            window.location.href = '/index.html';
          }
        }, 1000);

      } catch (err) {
        mostrar('estado-erro');
        document.getElementById('mensagem-erro').textContent = 'Erro de conexão. Tente novamente.';
      }
    }

    entrar();
  </script>
</body>
</html>
