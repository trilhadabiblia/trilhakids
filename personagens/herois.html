		function criarCarta(heroi) {
			return `
        <div class="group cursor-pointer" onclick="toggleCard(${heroi.id}, '${heroi.nome}')">
          <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl border-2 border-purple-500/30 hover:border-purple-400 shadow-2xl overflow-hidden transition-all duration-300 hover:shadow-purple-500/20 hover:shadow-2xl">
            
            <!-- Header Clicável -->
            <div class="bg-gradient-to-r ${heroi.cor} p-6 flex items-center justify-between hover:opacity-90 transition-opacity">
              <div class="flex items-center gap-4">
                <div class="flex-shrink-0 w-32 h-32 bg-white/10 backdrop-blur rounded-xl overflow-hidden flex items-center justify-center cursor-pointer hover:scale-105 transition-transform" onclick="abrirModal('${heroi.img}', '${heroi.nome}')">
                  <img 
                    src="${heroi.img}" 
                    alt="${heroi.nome}"
                    class="w-full h-full object-contain p-2"
                    
                  />
                </div>
                <div>
                  <h2 class="text-3xl font-black text-white drop-shadow-lg">${heroi.nome}</h2>
                  <p class="text-white/90 text-sm font-semibold mt-2">
                    📍 ${heroi.tribo} • ⏱️ ${heroi.periodo}
                  </p>
                </div>
              </div>
              <div class="flex-shrink-0">
                <svg class="w-8 h-8 text-white transition-transform duration-300 toggle-icon-${heroi.id}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                </svg>
              </div>
            </div>

            <!-- Conteúdo Expandível -->
            <div id="content-${heroi.id}" class="hidden bg-slate-800/50 px-6 pb-6 pt-0 space-y-5 max-h-96 overflow-y-auto">
              
              <!-- Poder Especial -->
              <div class="pt-6 border-t border-purple-500/30">
                <div class="flex items-center gap-2 mb-3">
                  <span class="text-2xl">⚡</span>
                  <h3 class="font-black text-amber-300 text-lg">PODER ESPECIAL</h3>
                </div>
                <p class="text-gray-200 pl-8">${heroi.poderEspecial}</p>
              </div>

              <!-- Pontos Fortes -->
              <div>
                <div class="flex items-center gap-2 mb-3">
                  <span class="text-2xl">✅</span>
                  <h3 class="font-black text-green-400 text-lg">PONTOS FORTES</h3>
                </div>
                <div class="pl-8 space-y-2">
                  ${heroi.fortes.map(f => `<p class="text-gray-200">🟢 ${f}</p>`).join('')}
                </div>
              </div>

              <!-- Pontos Fracos -->
              <div>
                <div class="flex items-center gap-2 mb-3">
                  <span class="text-2xl">⚠️</span>
                  <h3 class="font-black text-red-400 text-lg">PONTOS FRACOS</h3>
                </div>
                <div class="pl-8 space-y-2">
                  ${heroi.fracos.map(f => `<p class="text-gray-200">🔴 ${f}</p>`).join('')}
                </div>
              </div>

              <!-- Versículo -->
              <div class="bg-gradient-to-r from-blue-500/20 to-cyan-500/20 p-4 rounded-xl border border-blue-500/50 backdrop-blur">
                <div class="flex items-center gap-2 mb-3">
                  <span class="text-2xl">📖</span>
                  <h3 class="font-black text-blue-300 text-lg">VERSÍCULO DE PODER</h3>
                </div>
                <p class="text-gray-100 italic pl-8">"${heroi.versiculo}"</p>
                <p class="text-blue-200 pl-8 mt-2 font-bold">— ${heroi.referencia}</p>
              </div>

              <!-- Curiosidade -->
              <div class="bg-gradient-to-r from-purple-500/20 to-pink-500/20 p-4 rounded-xl border border-purple-500/50 backdrop-blur">
                <div class="flex items-center gap-2 mb-3">
                  <span class="text-2xl">💡</span>
                  <h3 class="font-black text-purple-300 text-lg">CURIOSIDADE BÍBLICA</h3>
                </div>
                <p class="text-gray-100 pl-8">${heroi.curiosidade}</p>
              </div>
            </div>
          </div>
        </div>
      `;
		}

		function toggleCard(id, nome) {
			const content = document.getElementById(`content-${id}`);
			const icon = document.querySelector(`.toggle-icon-${id}`);
			const wasHidden = content.classList.contains('hidden');
			content.classList.toggle('hidden');
			icon.style.transform = content.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
			if (wasHidden && nome && typeof trilhoGame !== 'undefined') {
				trilhoGame.visitarHeroi(nome);
			}
		}

		function abrirModal(src, nome) {
			document.getElementById('modal-imagem').classList.remove('hidden');
			document.getElementById('modal-imagem-src').src = src;
			document.getElementById('modal-titulo').textContent = nome;
		}

		function fecharModal() {
			document.getElementById('modal-imagem').classList.add('hidden');
		}

		// Fechar modal com ESC
		document.addEventListener('keydown', (e) => {
			if (e.key === 'Escape') fecharModal();
		});

		// Renderizar cartas
		const container = document.getElementById('cartas-container');
		juizes.forEach(heroi => {
			container.innerHTML += criarCarta(heroi);
		});
	</script>
